#
# Fork and compile the latest version yourself using Github Actions
#   1.Into the repository of your own fork
#   2.Into the repository [Settings]
#   3.[Code and automation - Actions] ↓ [General] → [Workflow permissions] ↓  Check the [Read and write permissions] and [Save]
#   4.Let's take [Actions]
#

name: "Auto compile with OpenWrt SDK"
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
  push:
env:
  TZ: Asia/Shanghai

jobs:
  job_check:
    if: github.repository == ${{ github.repository }}
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.check_version.outputs.latest_version }}
      has_update: ${{ steps.check_version.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: "main"

  job_build_qmodem:
    name: Build luci-app-qmodem (master)
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: |
          echo "Install packages"
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Cache openwrt SDK
        id: cache-sdk
        uses: actions/cache@v3
        with:
          path: sdk
          key: openwrt-sdk-snapshot-x86-64

      - name: Initialization environment
        env:
          url_sdk: https://archive.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        run: |
          if [ "${{ steps.cache-sdk.outputs.cache-hit }}" != "true" ]; then
            wget ${{ env.url_sdk }}
            file_name=$(echo ${{env.url_sdk}} | awk -F/ '{print $NF}')
            mkdir -p sdk && tar --zstd -xvf $file_name -C ./sdk --strip-components=1
            cd sdk  
            ./scripts/feeds update -a
          else
            cd sdk
          fi
          rm -rf package/downloads/luci-app-qmodem
          git clone -b main https://github.com/${{ github.repository }}.git package/downloads/repo-clone
          mkdir -p feeds/custom
          cp -r package/downloads/repo-clone/feeds/QModem/luci/luci-app-qmodem feeds/custom/
          echo "src-link custom $(pwd)/feeds/custom" >> feeds.conf.default
          echo "CONFIG_PACKAGE_luci-app-qmodem=m" > .config
          ./scripts/feeds update -a
          ./scripts/feeds install -d n custom
          make download -j8

      - name: Configure (master)
        run: |
          cd sdk
          ./scripts/feeds install custom
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem=m" >> .config
          make defconfig

      - name: Compile (master)
        id: compile
        run: |
          cd sdk
          echo "make package/feeds/custom/luci-app-qmodem/{clean,compile} -j$(nproc)"
          make package/feeds/custom/luci-app-qmodem/{clean,compile} -j$(nproc)
          mv bin/packages/x86_64/base/ ../
          rm .config .config.old
          cd ..
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload (master) ipks to release
        uses: softprops/action-gh-release@v1
        if: steps.compile.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{needs.job_check.outputs.package_version}}
          files: ${{ env.FIRMWARE }}/base/luci-app-qmodem*.*